<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Press Card - Hamid Qazi | Naya Express</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Noto Nastaliq Urdu', Arial, sans-serif;
        background: #e9ecef;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
    }
    .press-card {
        width: 380px;
        background: linear-gradient(135deg, #0a3d62 0%, #1e6091 100%);
        color: #fff;
        border-radius: 18px;
        box-shadow: 0 12px 30px rgba(0,0,0,0.35);
        overflow: hidden;
        border: 4px solid #f4b400;
    }
    .header {
        background: #f4b400;
        color: #0a3d62;
        text-align: center;
        padding: 14px;
        font-weight: 700;
        font-size: 20px;
        letter-spacing: 1px;
    }
    .sub-header {
        text-align: center;
        padding: 10px;
        background: #0a3d62;
        font-size: 17px;
        border-bottom: 2px solid #f4b400;
    }
    .content {
        padding: 25px 20px;
        line-height: 2.2;
        font-size: 16px;
    }
    .label {
        font-weight: bold;
        color: #f4b400;
        display: inline-block;
        width: 110px;
    }
    .photo-box {
        width: 90px;
        height: 110px;
        border: 3px solid #f4b400;
        background: #fff;
        float: left;
        margin: 0 0 15px 15px;
        border-radius: 8px;
        overflow: hidden;
    }
    .photo-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .footer {
        clear: both;
        text-align: center;
        padding: 12px;
        background: #000;
        font-size: 13px;
        color: #ccc;
        border-top: 2px solid #f4b400;
    }
</style>
</head>
<body>

<div class="press-card">
    <div class="header">NAYA EXPRESS MEDIA GROUP</div>
    <div class="sub-header">DAILY NAYA EXPRESS</div>
    
    <div class="content">
        <div class="photo-box">
            <img src="photo.jpg" alt="Hamid Qazi">
        </div>
        
        <div><span class="label">نام:</span> حمید قاضی</div>
        <div><span class="label">عہدہ:</span> بیورو چیف</div>
        <div><span class="label">شہر:</span> ضلع نارووال</div>
        <div><span class="label">شناختی کارڈ:</span> 34501-4153490-5</div>
        <div><span class="label">فون:</span> 0301-6605321</div>
    </div>
    
    <div class="footer">
        یہ کارڈ صرف شناخت کے لیے ہے | Naya Express Media Group
    </div>
</div>

</body>
</html>
