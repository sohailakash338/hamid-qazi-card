<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Press Card Verification | Naya Express Media Group</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
<style>
    * {margin:0; padding:0; box-sizing:border-box;}
    body {
        font-family: 'Noto Nastaliq Urdu', Arial, sans-serif;
        background: #e9ecef;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
    }
    
    /* Verification Box */
    .verify-box {
        width: 380px;
        background: #fff;
        border-radius: 18px;
        box-shadow: 0 12px 30px rgba(0,0,0,0.25);
        padding: 40px 30px;
        text-align: center;
        border: 4px solid #0a3d62;
    }
    .verify-title {
        color: #0a3d62;
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 10px;
    }
    .verify-sub {
        color: #666;
        font-size: 14px;
        margin-bottom: 30px;
    }
    .verify-box input {
        width: 100%;
        padding: 15px;
        border: 2px solid #0a3d62;
        border-radius: 10px;
        font-size: 16px;
        text-align: center;
        margin-bottom: 15px;
        font-family: 'Noto Nastaliq Urdu';
    }
    .verify-box input:focus {
        outline: none;
        border-color: #f4b400;
        box-shadow: 0 0 10px rgba(244,180,0,0.3);
    }
    .verify-btn {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #0a3d62 0%, #1e6091 100%);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
    }
    .verify-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(10,61,98,0.4);
    }
    
    /* Press Card - Your Design */
    .press-card {
        width: 380px;
        background: linear-gradient(135deg, #0a3d62 0%, #1e6091 100%);
        color: #fff;
        border-radius: 18px;
        box-shadow: 0 12px 30px rgba(0,0,0,0.35);
        overflow: hidden;
        border: 4px solid #f4b400;
        display: none;
    }
    .header {
        background: #f4b400;
        color: #0a3d62;
        text-align: center;
        padding: 14px;
        font-weight: 700;
        font-size: 20px;
    }
    .sub-header {
        text-align: center;
        padding: 10px;
        background: #0a3d62;
        font-size: 17px;
        border-bottom: 2px solid #f4b400;
    }
    .status-bar {
        background: #28a745;
        text-align: center;
        padding: 10px;
        font-weight: 700;
        font-size: 15px;
    }
    .content {
        padding: 25px 20px;
        line-height: 2.2;
        font-size: 16px;
    }
    .label {
        font-weight: bold;
        color: #f4b400;
        display: inline-block;
        width: 110px;
    }
    .photo-box {
        width: 90px;
        height: 110px;
        border: 3px solid #f4b400;
        background: #fff;
        float: left;
        margin: 0 0 15px 15px;
        border-radius: 8px;
        overflow: hidden;
    }
    .photo-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .footer {
        clear: both;
        text-align: center;
        padding: 12px;
        background: #000;
        font-size: 13px;
        color: #ccc;
        border-top: 2px solid #f4b400;
    }
</style>
</head>
<body>

<!-- Verification Page -->
<div class="verify-box" id="verifyBox">
    <div class="verify-title">پریس کارڈ ویریفیکیشن</div>
    <div class="verify-sub">NAYA EXPRESS MEDIA GROUP</div>
    <input type="text" id="cardNo" placeholder="پریس کارڈ نمبر درج کریں" value="34501-4153490-5">
    <button class="verify-btn" onclick="verifyCard()">ویریفائی کریں</button>
</div>

<!-- Press Card Page -->
<div class="press-card" id="pressCard">
    <div class="header">NAYA EXPRESS MEDIA GROUP</div>
    <div class="sub-header">DAILY NAYA EXPRESS</div>
    <div class="status-bar">Status: Active ✅</div>
    
    <div class="content">
        <div class="photo-box">
            <img src="photo.jpg" alt="Hamid Qazi">
        </div>
        
        <div><span class="label">نام:</span> حمید قاضی</div>
        <div><span class="label">عہدہ:</span> بیورو چیف</div>
        <div><span class="label">شہر:</span> ضلع نارووال</div>
        <div><span class="label">شناختی کارڈ:</span> 34501-4153490-5</div>
        <div><span class="label">فون:</span> 0301-6605321</div>
    </div>
    
    <div class="footer">
        یہ کارڈ صرف شناخت کے لیے ہے | Naya Express Media Group
    </div>
</div>

<script>
function verifyCard(){
    let no = document.getElementById('cardNo').value.trim();
    if(no == "34501-4153490-5"){
        document.getElementById('verifyBox').style.display = 'none';
        document.getElementById('pressCard').style.display = 'block';
    } else {
        alert('غلط پریس کارڈ نمبر! براہ کرم درست نمبر درج کریں: 34501-4153490-5');
    }
}
</script>

</body>
</html>
